function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || 'Copied!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast());
}

// Compute values for any basis
function getScaled(p, skuIdx) {
  const sku = p.skus[skuIdx || 0];
  const sOz = sku.serv_oz, pOz = sku.pkg_oz;
  const epaDha = p.epa + p.dha;
  const totalO3 = p.epa + p.dha + p.ala;

  function makeSet(oz, label, suffix) {
    return {
      label, suffix, oz,
      epa: scale(p.epa, oz), dha: scale(p.dha, oz), ala: scale(p.ala, oz),
      epaDha: scale(epaDha, oz), totalO3: scale(totalO3, oz),
      omega6: scale(p.omega6, oz), ara: scale(p.ara, oz),
      protein: p.pro != null ? (p.pro * (oz * OZ_TO_G) / 100) : null,
      se: scale(p.se, oz), zinc: scale(p.zinc, oz), copper: scale(p.copper, oz),
      magnesium: p.magnesium != null ? (p.magnesium * (oz * OZ_TO_G) / 100) : null,
      phosphorus: p.phosphorus != null ? (p.phosphorus * (oz * OZ_TO_G) / 100) : null,
      manganese: scale(p.manganese, oz), iodine: scale(p.iodine, oz),
      chromium: scale(p.chromium, oz), cholesterol: p.cholesterol != null ? (p.cholesterol * (oz * OZ_TO_G) / 100) : null,
      vitd: scale(p.vitd, oz), vitb12: scale(p.vitb12, oz), vite: scale(p.vite, oz),
      hg: p.hg != null ? (p.hg / 10) * (oz * OZ_TO_G) / 100 : null,
      arsenic: p.arsenic != null ? (p.arsenic * (oz * OZ_TO_G) / 100) : null,
      cadmium: p.cadmium != null ? (p.cadmium * (oz * OZ_TO_G) / 100) : null,
      lead: p.lead != null ? (p.lead * (oz * OZ_TO_G) / 100) : null,
      o63: p.o63, hg_loq: p.hg_loq
    };
  }

  return {
    per100g: {
      label:'per 100g', suffix:'/100g', oz:null,
      epa:p.epa, dha:p.dha, ala:p.ala, epaDha, totalO3,
      omega6:p.omega6, ara:p.ara, protein:p.pro, se:p.se,
      zinc:p.zinc, copper:p.copper, magnesium:p.magnesium, phosphorus:p.phosphorus,
      manganese:p.manganese, iodine:p.iodine, chromium:p.chromium,
      cholesterol:p.cholesterol, vitd:p.vitd, vitb12:p.vitb12, vite:p.vite,
      hg:p.hg, arsenic:p.arsenic, cadmium:p.cadmium, lead:p.lead,
      o63:p.o63, hg_loq:p.hg_loq
    },
    serving: makeSet(sOz, `per ${sOz}oz serving`, '/serving'),
    package: makeSet(pOz, `per ${pOz}oz package`, '/package')
  };
}

function nutrientCard(label, value, unit, dec, basisLabel, dv, highlight, isLoq) {
  const display = isLoq ? '< LOQ' : (value == null ? '—' : fmt(value, dec));
  const unitD = isLoq ? '' : unit;
  const dvHtml = dv != null && dv > 0 ? `<div class="n-dv">${dv}% Daily Value</div>` : '';
  const copyVal = isLoq ? `${label}: Below LOQ (${basisLabel})` : `${label}: ${display} ${unitD} (${basisLabel})`;
  return `<div class="nutrient-card ${highlight ? 'highlight' : ''}">
    <button class="copy-btn" onclick="event.stopPropagation();copyText('${copyVal.replace(/'/g,"\\'")}')">📋</button>
    <div class="n-label">${label}</div>
    <div class="n-value">${display} <span class="n-unit">${unitD}</span></div>
    ${dvHtml}
    <div class="n-basis">${basisLabel}</div>
  </div>`;
}

function compRow(label, vals, key, unit, dec, group) {
  const f = (v) => v == null ? '—' : fmt(v, dec);
  return `<tr>
    <td><strong>${label}</strong></td>
    <td class="col-100g">${f(vals.per100g[key])}</td>
    <td class="col-serv">${f(vals.serving[key])}</td>
    <td class="col-pkg">${f(vals.package[key])}</td>
    <td style="color:#888;font-size:0.78rem">${unit}</td>
  </tr>`;
}

function groupHeader(label) {
  return `<tr class="group-header"><td colspan="5">${label}</td></tr>`;
}

function renderCoaLinks(p) {
  let links = [];
  if (p.coas?.edacious) {
    const status = p.coas.edacious_status || 'pending';
    const badgeClass = status === 'verified' ? 'edacious' : (status === 'private' ? 'private' : 'edacious');
    const badgeLabel = status.charAt(0).toUpperCase() + status.slice(1);
    links.push(`<a href="${p.coas.edacious}" target="_blank" rel="noopener"><span class="coa-badge ${badgeClass}">${badgeLabel}</span>Edacious Full Panel</a>`);
  }
  if (p.coas?.lightlabs) {
    links.push(`<span style="font-size:0.8rem;color:#666">Light Labs COAs: ${p.coas.lightlabs.map(id => `#${id}`).join(', ')}</span>`);
  }
  if (p.mp_tested) {
    links.push(`<span style="font-size:0.8rem;color:var(--green)">🔬 Microplastics tested — ND across all 6 polymers</span>`);
  }
  if (!links.length) return '';
  return `<div class="coa-links">
    <h4>Certificates of Analysis</h4>
    <div>${links.join('<br>')}</div>
  </div>`;
}

function anaRow(label, vals, key, unit, dec, dvRef, isRatio, isLoq) {
  const f = (v) => {
    if (isLoq) return '< LOQ';
    return v == null ? '—' : fmt(v, dec);
  };
  const v100 = vals.per100g[key];
  const vServ = vals.serving[key];
  const vPkg = vals.package[key];
  let dvStr = '';
  if (dvRef && vServ != null && !isRatio) {
    const pct = Math.round((vServ / dvRef) * 100);
    dvStr = `<span style="color:${pct >= 20 ? 'var(--green)' : '#888'};font-weight:${pct >= 20 ? '600' : '400'}">${pct}%</span>`;
  }
  if (isRatio) {
    // Same across all bases
    return `<tr>
      <td>${label}</td>
      <td class="col-100g">${f(v100)}</td>
      <td class="col-serv">${f(v100)}</td>
      <td class="col-pkg">${f(v100)}</td>
      <td style="color:#888;font-size:0.78rem">${unit}</td>
      <td>${v100 != null && v100 < 1 ? '<span style="color:var(--green);font-weight:600">Anti-inflammatory</span>' : (v100 != null ? '<span style="color:#888">Pro-inflammatory</span>' : '')}</td>
    </tr>`;
  }
  return `<tr>
    <td>${label}</td>
    <td class="col-100g">${f(v100)}</td>
    <td class="col-serv">${f(vServ)}</td>
    <td class="col-pkg">${f(vPkg)}</td>
    <td style="color:#888;font-size:0.78rem">${unit}</td>
    <td>${dvStr}</td>
  </tr>`;
}

  }

  if (p.o63 != null && p.o63 < 1) {
    claims.push({ icon:'⚖️', text:`Omega-6:3 ratio of <strong>${p.o63.toFixed(2)}</strong> — anti-inflammatory profile (below 1:1).`,
      plain:`Omega-6:3 ratio of ${p.o63.toFixed(2)} — anti-inflammatory profile (below 1:1).` });
  }

  if (p.hg_loq) {
    claims.push({ icon:'✅', text:`Mercury <strong>below limit of quantitation</strong> (&lt;10 ppb). Lab-verified.`,
      plain:`Mercury below limit of quantitation (<10 ppb). Lab-verified.` });
  } else if (p.hg < 20) {
    claims.push({ icon:'✅', text:`Ultra-low mercury at <strong>${fmt(p.hg,1)} ppb</strong> (FDA action level: 1,000 ppb).`,
      plain:`Ultra-low mercury at ${fmt(p.hg,1)} ppb (FDA action level: 1,000 ppb).` });
  }

  if (p.claims_special) {
    p.claims_special.forEach(c => {
      claims.push({ icon:'🔬', text:`<strong>${c}</strong>`, plain: c });
    });
  }

  const servPerPkg = sku.pkg_oz / sku.serv_oz;
  if (servPerPkg > 1.5) {
    const pkgEpaDha = scale(p.epa + p.dha, sku.pkg_oz);
    claims.push({ icon:'📦', text:`<strong>${fmt(pkgEpaDha,0)} mg EPA+DHA per package</strong> (${sku.pkg_oz}oz, ${fmt(servPerPkg,1)} servings).`,
      plain:`${fmt(pkgEpaDha,0)} mg EPA+DHA per package (${sku.pkg_oz}oz, ${fmt(servPerPkg,1)} servings).` });
  }

  claims.push({ icon:'🧬', text:`Omega-3 in whole fish is in <strong>phospholipid and triglyceride form</strong> — 2-3× more bioavailable than ethyl ester fish oil capsules.`,
    plain:`Omega-3 in whole fish is in phospholipid and triglyceride form — 2-3× more bioavailable than ethyl ester fish oil capsules.` });

  return claims;
}

function renderClaims(p, vals, skuIdx) {
  const claims = generateClaims(p, vals, skuIdx);
  return `
    ${renderCoaLinks(p)}
    <div class="claims-section" style="margin-top:0">
      <div class="section-title" style="margin-top:0">Ready-to-Use Marketing Claims</div>
      <div class="section-subtitle">Auto-generated from lab data. Click "Copy" on any claim.</div>
      ${claims.map(c => `
        <div class="claim-item">
          <span class="claim-icon">${c.icon}</span>
          <span class="claim-text">${c.text}</span>
          <button class="claim-copy" onclick="copyText(\`${c.plain.replace(/`/g,"'").replace(/\\/g,'\\\\')}\`)">Copy</button>
        </div>
      `).join('')}
    </div>
  `;
}

function copyAllClaims() {
  const p = PRODUCTS[currentProduct];
  const vals = getScaled(p, currentSkuIdx);
  const sku = p.skus[currentSkuIdx];
  const claims = generateClaims(p, vals, currentSkuIdx);

  let text = `${p.name} (${p.farm}) — ${sku.sku}\n`;
  text += `Serving: ${sku.serv_oz}oz | Package: ${sku.pkg_oz}oz\n`;
  text += `Role: ${p.role}\n`;
  if (p.coas?.edacious) text += `Edacious: ${p.coas.edacious}\n`;
  text += `\nMARKETING CLAIMS:\n`;
  claims.forEach((c, i) => { text += `${i+1}. ${c.plain}\n`; });
  navigator.clipboard.writeText(text).then(() => toast('All claims copied!'));
}

// ── MAIN RENDER ──

    ).join('')}</div>`;

          <div>Package: <strong>${sku.pkg_oz} oz</strong> (${(sku.pkg_oz*OZ_TO_G).toFixed(0)}g)</div>

// ══════════════════════════════════════════════════════════
// CSV EXPORT — Supabase-ready flat table
// ══════════════════════════════════════════════════════════
const CSV_COLUMNS = [
  // Identity
  'product_name','farm','category','sku','sku_label','serving_oz','package_oz','servings_per_package',
  // Omega-3 per 100g
  'epa_mg_per100g','dha_mg_per100g','ala_mg_per100g','epa_dha_mg_per100g','total_omega3_mg_per100g',
  // Omega-6 per 100g
  'omega6_mg_per100g','ara_mg_per100g','omega6_3_ratio',
  // Protein & Macros per 100g
  'protein_g_per100g','cholesterol_mg_per100g',
  // Minerals per 100g
  'selenium_mcg_per100g','zinc_mcg_per100g','copper_mcg_per100g','magnesium_mg_per100g',
  'phosphorus_mg_per100g','manganese_mcg_per100g','iodine_mcg_per100g','chromium_mcg_per100g',
  // Vitamins per 100g
  'vitamin_d_mcg_per100g','vitamin_b12_mcg_per100g','vitamin_e_mcg_per100g',
  // Heavy Metals
  'mercury_ppb','arsenic_mcg_per100g','cadmium_mcg_per100g','lead_mcg_per100g',
  'mercury_below_loq',
  // Per Serving (computed)
  'epa_dha_mg_per_serving','total_omega3_mg_per_serving','protein_g_per_serving',
  'selenium_mcg_per_serving','zinc_mcg_per_serving','magnesium_mg_per_serving',
  'phosphorus_mg_per_serving','iodine_mcg_per_serving',
  'vitamin_d_mcg_per_serving','vitamin_b12_mcg_per_serving','vitamin_e_mcg_per_serving',
  // Per Package (computed)
  'epa_dha_mg_per_package','total_omega3_mg_per_package','protein_g_per_package',
  // %DV per serving
  'protein_pct_dv','selenium_pct_dv','zinc_pct_dv','magnesium_pct_dv','phosphorus_pct_dv',
  'iodine_pct_dv','vitamin_d_pct_dv','vitamin_b12_pct_dv','vitamin_e_pct_dv',
  // Context
  'functional_role','functional_stacks','edacious_url','edacious_status','microplastics_tested',
  'data_source'
];

function productToRows(p) {
  const rows = [];
  p.skus.forEach(sku => {
    const sOz = sku.serv_oz, pOz = sku.pkg_oz;
    const epaDha = p.epa + p.dha;
    const totalO3 = p.epa + p.dha + p.ala;
    const s = (v, oz) => v != null ? +(v * (oz * OZ_TO_G) / 100).toFixed(2) : '';
    const sm = (v, oz) => v != null ? +(v * (oz * OZ_TO_G) / 100 / 10).toFixed(2) : ''; // for g->g scale (protein uses *10 trick)
    const dv = (v, ref) => v != null && ref ? Math.round((v / ref) * 100) : '';

    const proServ = p.pro != null ? +(p.pro * (sOz * OZ_TO_G) / 100).toFixed(1) : '';
    const proPkg = p.pro != null ? +(p.pro * (pOz * OZ_TO_G) / 100).toFixed(1) : '';
    const seServ = s(p.se, sOz);
    const znServ = s(p.zinc, sOz);
    const mgServ = p.magnesium != null ? +(p.magnesium * (sOz * OZ_TO_G) / 100).toFixed(1) : '';
    const phServ = p.phosphorus != null ? +(p.phosphorus * (sOz * OZ_TO_G) / 100).toFixed(1) : '';
    const ioServ = s(p.iodine, sOz);
    const vdServ = s(p.vitd, sOz);
    const vb12Serv = s(p.vitb12, sOz);
    const veServ = s(p.vite, sOz);

    rows.push({
      product_name: p.name, farm: p.farm, category: p.cat,
      sku: sku.sku, sku_label: sku.label,
      serving_oz: sOz, package_oz: pOz,
      servings_per_package: +(pOz / sOz).toFixed(1),
      // Per 100g
      epa_mg_per100g: p.epa, dha_mg_per100g: p.dha, ala_mg_per100g: p.ala,
      epa_dha_mg_per100g: epaDha, total_omega3_mg_per100g: totalO3,
      omega6_mg_per100g: p.omega6 ?? '', ara_mg_per100g: p.ara ?? '',
      omega6_3_ratio: p.o63 ?? '',
      protein_g_per100g: p.pro ?? '', cholesterol_mg_per100g: p.cholesterol ?? '',
      selenium_mcg_per100g: p.se ?? '', zinc_mcg_per100g: p.zinc ?? '',
      copper_mcg_per100g: p.copper ?? '', magnesium_mg_per100g: p.magnesium ?? '',
      phosphorus_mg_per100g: p.phosphorus ?? '', manganese_mcg_per100g: p.manganese ?? '',
      iodine_mcg_per100g: p.iodine ?? '', chromium_mcg_per100g: p.chromium ?? '',
      vitamin_d_mcg_per100g: p.vitd ?? '', vitamin_b12_mcg_per100g: p.vitb12 ?? '',
      vitamin_e_mcg_per100g: p.vite ?? '',
      mercury_ppb: p.hg ?? '', arsenic_mcg_per100g: p.arsenic ?? '',
      cadmium_mcg_per100g: p.cadmium ?? '', lead_mcg_per100g: p.lead ?? '',
      mercury_below_loq: p.hg_loq ? 'TRUE' : 'FALSE',
      // Per Serving
      epa_dha_mg_per_serving: s(epaDha, sOz), total_omega3_mg_per_serving: s(totalO3, sOz),
      protein_g_per_serving: proServ,
      selenium_mcg_per_serving: seServ, zinc_mcg_per_serving: znServ,
      magnesium_mg_per_serving: mgServ, phosphorus_mg_per_serving: phServ,
      iodine_mcg_per_serving: ioServ,
      vitamin_d_mcg_per_serving: vdServ, vitamin_b12_mcg_per_serving: vb12Serv,
      vitamin_e_mcg_per_serving: veServ,
      // Per Package
      epa_dha_mg_per_package: s(epaDha, pOz), total_omega3_mg_per_package: s(totalO3, pOz),
      protein_g_per_package: proPkg,
      // %DV
      protein_pct_dv: dv(proServ, DV.protein_g), selenium_pct_dv: dv(seServ, DV.se_mcg),
      zinc_pct_dv: dv(znServ, DV.zinc_mcg), magnesium_pct_dv: dv(mgServ, DV.magnesium_mg),
      phosphorus_pct_dv: dv(phServ, DV.phosphorus_mg), iodine_pct_dv: dv(ioServ, DV.iodine_mcg),
      vitamin_d_pct_dv: dv(vdServ, DV.vitd_mcg), vitamin_b12_pct_dv: dv(vb12Serv, DV.vitb12_mcg),
      vitamin_e_pct_dv: dv(veServ, DV.vite_mcg),
      // Context
      functional_role: p.role || '',
      functional_stacks: (p.functional || []).join('; '),
      edacious_url: p.coas?.edacious || '',
      edacious_status: p.coas?.edacious_status || '',
      microplastics_tested: p.mp_tested ? 'TRUE' : 'FALSE',
      data_source: 'Light Labs + Edacious'
    });
  });
  return rows;
}

function rowToCSV(row) {
  return CSV_COLUMNS.map(col => {
    let v = row[col] ?? '';
    v = String(v);
    if (v.includes(',') || v.includes('"') || v.includes('\n')) v = '"' + v.replace(/"/g, '""') + '"';
    return v;
  }).join(',');
}

function downloadCSV(filename, csvContent) {
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

function exportProductCSV() {
  const p = PRODUCTS[currentProduct];
  const rows = productToRows(p);
  const csv = CSV_COLUMNS.join(',') + '\n' + rows.map(rowToCSV).join('\n');
  const safeName = p.name.replace(/\s+/g, '_') + '_' + p.farm.replace(/\s+/g, '_');
  downloadCSV(`seatopia_${safeName}_nutrition.csv`, csv);
}

function exportAllProductsCSV() {
  const allRows = PRODUCTS.flatMap(productToRows);
  const csv = CSV_COLUMNS.join(',') + '\n' + allRows.map(rowToCSV).join('\n');
  downloadCSV('seatopia_all_products_wide.csv', csv);
}

function exportAllNormalized() {
  // Products table
  const prodHeaders = ['sku','product_name','farm','category','sku_label','serving_oz','package_oz','servings_per_package','functional_role','functional_stacks','edacious_url','edacious_status','microplastics_tested','mercury_below_loq','data_source'];
  let prodCSV = prodHeaders.join(',') + '\n';

  // Nutrition table
  const nutrHeaders = ['sku','analyte','display_name','category','sort_order','value_per_100g','unit_per_100g','value_per_serving','value_per_package','unit_scaled','pct_daily_value_per_serving','daily_value_reference','below_loq'];
  let nutrCSV = nutrHeaders.join(',') + '\n';

  PRODUCTS.forEach(p => {
    p.skus.forEach(sku => {
      const sOz = sku.serv_oz, pOz = sku.pkg_oz;
      // Products row
      const esc = v => { let s=String(v??''); return s.includes(',')||s.includes('"') ? '"'+s.replace(/"/g,'""')+'"' : s; };
      prodCSV += [sku.sku,p.name,p.farm,p.cat,sku.label,sOz,pOz,(pOz/sOz).toFixed(1),
        p.role||'',(p.functional||[]).join('; '),p.coas?.edacious||'',p.coas?.edacious_status||'',
        p.mp_tested?'TRUE':'FALSE',p.hg_loq?'TRUE':'FALSE','Light Labs + Edacious'
      ].map(esc).join(',') + '\n';

      // Nutrition rows
      ANALYTE_DEFS.forEach(a => {
        let v100;
        if (a.key === '_epaDha') v100 = p.epa + p.dha;
        else if (a.key === '_totalO3') v100 = p.epa + p.dha + p.ala;
        else v100 = p[a.key];

        if (v100 == null) return;

        const isRatio = a.unit === 'ratio';
        const isMerc = a.slug === 'mercury';
        let vServ, vPkg, unitScaled;

        if (isRatio) { vServ = v100; vPkg = v100; unitScaled = 'ratio'; }
        else if (isMerc) {
          vServ = +((v100/10)*(sOz*OZ_TO_G)/100).toFixed(2);
          vPkg = +((v100/10)*(pOz*OZ_TO_G)/100).toFixed(2);
          unitScaled = 'mcg';
        } else {
          vServ = +(v100*(sOz*OZ_TO_G)/100).toFixed(2);
          vPkg = +(v100*(pOz*OZ_TO_G)/100).toFixed(2);
          unitScaled = a.unit;
        }

        let pctDV = '';
        if (a.dvRef && vServ) pctDV = Math.round((vServ / a.dvRef) * 100);

        nutrCSV += [sku.sku,a.slug,a.name,a.cat,a.sort,v100,isMerc?'ppb':a.unit,
          vServ,vPkg,unitScaled,pctDV,a.dvRef||'',
          (a.slug==='mercury'&&p.hg_loq)?'TRUE':'FALSE'
        ].map(esc).join(',') + '\n';
      });
    });
  });

  // Download both as a zip-like pair
  downloadCSV('supabase_seatopia_products.csv', prodCSV);
  setTimeout(() => downloadCSV('supabase_seatopia_product_nutrition.csv', nutrCSV), 500);
  setTimeout(() => toast('Both Supabase CSVs downloaded!'), 1000);
}
