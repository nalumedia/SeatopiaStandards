<html lang="en">
<head>

  <title>Seatopia — Omega Meter Packaging System</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Karla:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep-ocean: #0B2A3A;
      --ocean-mid: #143d52;
      --soft-sea: #4B7991;
      --maya-blue: #7BC3F3;
      --sky-light: #b8ddf5;
      --gold-accent: #D4A76A;
      --gold-light: #E8C88A;
      --white: #FFFFFF;
      --off-white: #F8FAFB;
      --moss-green: #2e8b57;
      --purity-green: #3BA676;
      --mercury-safe: #4CAF50;
      --linen: #F7EFE6;
      --charcoal: #1a1a1a;
      --meter-track: rgba(75, 121, 145, 0.12);
      --meter-fill-blue: linear-gradient(90deg, #0B2A3A 0%, #4B7991 100%);
      --meter-fill-gold: linear-gradient(90deg, #4B7991 0%, #7BC3F3 60%, #D4A76A 100%);
    }

    body {
      font-family: 'Karla', sans-serif;
      background: var(--off-white);
      color: var(--charcoal);
      line-height: 1.5;
    }

    /* ═══ HEADER ═══ */
    .sys-header {
      background: var(--deep-ocean);
      padding: 32px 24px 28px;
      text-align: center;
    }
    .sys-header h1 {
      font-family: 'EB Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .sys-header p {
      font-size: 13px;
      color: var(--maya-blue);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    /* ═══ CONTROLS ═══ */
    .controls {
      max-width: 1200px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ctrl-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--soft-sea);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-right: 4px;
    }
    .ctrl-btn {
      padding: 7px 16px;
      border: 1.5px solid rgba(11,42,58,0.15);
      background: var(--white);
      font-family: 'Karla', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--deep-ocean);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--soft-sea); }
    .ctrl-btn.active {
      background: var(--deep-ocean);
      color: var(--white);
      border-color: var(--deep-ocean);
    }
    .ctrl-spacer { flex: 1; }
    .ctrl-group { display: flex; gap: 0; }
    .ctrl-group .ctrl-btn { border-radius: 0; border-left-width: 0; }
    .ctrl-group .ctrl-btn:first-child { border-radius: 6px 0 0 6px; border-left-width: 1.5px; }
    .ctrl-group .ctrl-btn:last-child { border-radius: 0 6px 6px 0; }

    /* ═══ GRID ═══ */
    .grid {
      max-width: 1200px;
      margin: 24px auto 80px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
    }

    /* ═══ PACKAGE CARD ═══ */
    .pkg-card {
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(11,42,58,0.06);
      border: 1px solid rgba(11,42,58,0.06);
      transition: box-shadow 0.3s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    .pkg-card:hover {
      box-shadow: 0 8px 32px rgba(11,42,58,0.1);
      transform: translateY(-2px);
    }

    /* Tier accent stripe */
    .pkg-card[data-tier="hero"] { border-top: 3px solid var(--gold-accent); }
    .pkg-card[data-tier="core"] { border-top: 3px solid var(--maya-blue); }
    .pkg-card[data-tier="supporting"] { border-top: 3px solid var(--soft-sea); }

    /* ─── TOP: Emotion / Brand ─── */
    .pkg-top {
      padding: 28px 28px 0;
    }
    .pkg-tier-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 3px 10px;
      border-radius: 3px;
      margin-bottom: 12px;
    }
    .pkg-card[data-tier="hero"] .pkg-tier-tag {
      background: linear-gradient(135deg, rgba(212,167,106,0.15), rgba(212,167,106,0.08));
      color: var(--gold-accent);
    }
    .pkg-card[data-tier="core"] .pkg-tier-tag {
      background: rgba(123,195,243,0.12);
      color: var(--soft-sea);
    }
    .pkg-card[data-tier="supporting"] .pkg-tier-tag {
      background: rgba(75,121,145,0.08);
      color: var(--soft-sea);
    }
    .pkg-species {
      font-family: 'EB Garamond', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--deep-ocean);
      line-height: 1.2;
    }
    .pkg-farm {
      font-size: 13px;
      font-weight: 600;
      color: var(--soft-sea);
      margin-top: 2px;
    }
    .pkg-poetic {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--soft-sea);
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ─── CENTER: Omega Meters ─── */
    .pkg-meters {
      padding: 24px 28px;
    }

    /* Daily Meter */
    .meter-section {
      margin-bottom: 20px;
    }
    .meter-section:last-child { margin-bottom: 0; }

    .meter-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .meter-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--deep-ocean);
    }
    .meter-value {
      font-family: 'Karla', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--deep-ocean);
    }
    .meter-value .pct {
      font-size: 18px;
      font-weight: 800;
    }
    .meter-value .pct.over100 {
      color: var(--gold-accent);
    }

    .meter-track {
      position: relative;
      height: 28px;
      background: var(--meter-track);
      border-radius: 6px;
      overflow: visible;
    }
    .meter-fill {
      height: 100%;
      border-radius: 6px;
      position: relative;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 2px;
    }
    .meter-fill.blue {
      background: linear-gradient(90deg, #0B2A3A, #4B7991);
    }
    .meter-fill.gold {
      background: linear-gradient(90deg, #0B2A3A 0%, #4B7991 55%, #D4A76A 100%);
      box-shadow: 0 0 12px rgba(212, 167, 106, 0.3);
    }
    .meter-100-mark {
      position: absolute;
      top: -3px;
      bottom: -3px;
      width: 2px;
      background: var(--deep-ocean);
      opacity: 0.3;
      z-index: 2;
    }
    .meter-100-label {
      position: absolute;
      top: -16px;
      font-size: 9px;
      font-weight: 700;
      color: var(--soft-sea);
      transform: translateX(-50%);
    }

    .meter-mg {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .meter-mg-total {
      font-size: 12px;
      font-weight: 700;
      color: var(--deep-ocean);
    }
    .meter-mg-sub {
      font-size: 11px;
      color: var(--soft-sea);
    }

    /* Weekly meter — smaller */
    .meter-weekly .meter-track {
      height: 16px;
    }
    .meter-weekly .meter-label {
      font-size: 9px;
      color: var(--soft-sea);
    }
    .meter-weekly .meter-value .pct {
      font-size: 14px;
    }

    /* ─── DOSE CARD ─── */
    .dose-card {
      margin: 0 28px;
      padding: 20px;
      background: var(--off-white);
      border-radius: 10px;
      border: 1px solid rgba(11,42,58,0.06);
    }
    .dose-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .dose-row + .dose-row {
      border-top: 1px solid rgba(11,42,58,0.06);
    }
    .dose-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--soft-sea);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .dose-value {
      font-family: 'Karla', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--deep-ocean);
    }
    .dose-row.total {
      padding-top: 10px;
      margin-top: 4px;
      border-top: 2px solid var(--deep-ocean) !important;
    }
    .dose-row.total .dose-label {
      color: var(--deep-ocean);
      font-size: 13px;
    }
    .dose-row.total .dose-value {
      font-size: 20px;
    }

    /* ─── PURITY BADGES ─── */
    .purity-strip {
      padding: 18px 28px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .purity-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .purity-badge.verified {
      background: rgba(59,166,118,0.08);
      color: var(--purity-green);
      border: 1px solid rgba(59,166,118,0.2);
    }

      background: rgba(76,175,80,0.06);
      color: var(--mercury-safe);
      border: 1px solid rgba(76,175,80,0.15);
    }
    .purity-badge.purity {
      background: rgba(75,121,145,0.06);
      color: var(--soft-sea);
      border: 1px solid rgba(75,121,145,0.15);
    }

    /* ─── SERVING INFO ─── */
    .pkg-serving {
      padding: 0 28px 20px;
      font-size: 12px;
      color: var(--soft-sea);
    }

    /* ─── SVG ICONS ─── */
    .icon-sm { width: 14px; height: 14px; flex-shrink: 0; }

    /* ═══ HERO CARD (Tier 1 expanded) ═══ */
    .pkg-card[data-tier="hero"] .pkg-species { font-size: 30px; }
    .pkg-card[data-tier="hero"] .meter-track { height: 32px; }
    .pkg-card[data-tier="hero"] .meter-value .pct { font-size: 22px; }

    /* ═══ SUPPORTING CARD (compact) ═══ */
    .pkg-card[data-tier="supporting"] .pkg-meters { padding: 18px 28px; }
    .pkg-card[data-tier="supporting"] .meter-track { height: 22px; }
    .pkg-card[data-tier="supporting"] .meter-value .pct { font-size: 14px; }
    .pkg-card[data-tier="supporting"] .meter-header .meter-label { font-size: 9px; }

    /* ═══ BACK-OF-PACK (expandable) ═══ */
    .pkg-back {
      margin: 0 28px 24px;
      padding: 20px;
      background: rgba(11,42,58,0.03);
      border-radius: 10px;
      border: 1px solid rgba(11,42,58,0.06);
      display: none;
    }
    .pkg-card.expanded .pkg-back { display: block; }
    .back-toggle {
      display: block;
      width: 100%;
      padding: 10px 28px;
      background: none;
      border: none;
      border-top: 1px solid rgba(11,42,58,0.06);
      font-family: 'Karla', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--soft-sea);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .back-toggle:hover { color: var(--deep-ocean); }

    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .weekly-day {
      text-align: center;
    }
    .weekly-day-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--soft-sea);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .weekly-day-bar {
      height: 36px;
      border-radius: 4px;
      background: var(--meter-track);
      position: relative;
      overflow: hidden;
    }
    .weekly-day-bar .fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, var(--maya-blue), var(--soft-sea));
      border-radius: 4px;
      transition: height 0.4s;
    }
    .weekly-day-bar.active .fill {
      background: linear-gradient(180deg, var(--gold-accent), #0B2A3A);
    }

    .back-edu {
      font-size: 12px;
      line-height: 1.6;
      color: var(--soft-sea);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(11,42,58,0.08);
    }

    .back-data {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(11,42,58,0.08);
    }
    .back-data-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    .back-data-label { color: var(--soft-sea); font-weight: 600; }
    .back-data-value { color: var(--deep-ocean); font-weight: 700; }

    /* ═══ BG TOGGLE ═══ */
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ══════════════════════════════════════════════════════════════
// COMPUTE
// ══════════════════════════════════════════════════════════════
function getServing(handle, oz) {
  const b = NUTRITION[handle];
  if (!b) return null;
  const f = (oz * OZ_TO_G) / 100;
  return {
    epa: Math.round(b.epa * f),
    dha: Math.round(b.dha * f),
    ala: Math.round(b.ala * f),
    get epa_dha() { return this.epa + this.dha; },
    get total() { return this.epa + this.dha + this.ala; },
    protein_g: b.protein_g,
    hg_ppb: b.hg_ppb,
    se_mcg: b.se_mcg,
    source: b.source
  };
}

function getTier(dailyPct) {
  if (dailyPct >= 100) return 'hero';
  if (dailyPct >= 40) return 'core';
  return 'supporting';
}

function tierLabel(tier) {
  if (tier === 'hero') return 'Optimal Zone';
  if (tier === 'core') return 'Core';
  return 'Building Block';
}

function isVerified(handle) {
  const tests = TEST_DATA[handle];
  return tests && tests.some(t => COA_MAP[t.code]);
}

function fmt(n) { return Math.round(n).toLocaleString(); }

let activeFilter = 'all';
let bgWhite = false;

function renderControls() {
  const tiers = [
    { key: 'all', label: 'All Products' },
    { key: 'hero', label: 'Hero (100%+ DV)' },
    { key: 'core', label: 'Core (40–99%)' },
    { key: 'supporting', label: 'Supporting (<40%)' }
  ];

  let html = `<span class="ctrl-label">Tier</span>`;
  html += `<div class="ctrl-group">`;
  tiers.forEach(t => {
    html += `<button class="ctrl-btn ${activeFilter === t.key ? 'active' : ''}" onclick="setFilter('${t.key}')">${t.label}</button>`;
  });
  html += `</div>`;
  html += `<span class="ctrl-spacer"></span>`;
  html += `<button class="ctrl-btn ${bgWhite ? 'active' : ''}" onclick="toggleBg()">${bgWhite ? '◼ Dark BG' : '◻ White BG'}</button>`;

  document.getElementById('controls').innerHTML = html;
}

function setFilter(f) {
  activeFilter = f;
  renderControls();
  renderGrid();
}

function toggleBg() {
  bgWhite = !bgWhite;
  document.body.style.background = bgWhite ? '#fff' : 'var(--off-white)';
  renderControls();
}

            <div class="back-data-row"><span class="back-data-label" style="color:#999">Total Omega-3</span><span class="back-data-value" style="color:#999">${NUTRITION[s.handle].epa + NUTRITION[s.handle].dha + NUTRITION[s.handle].ala} mg/100g</span></div>

            <div class="back-data-row"><span class="back-data-label" style="color:#999">Total Omega-3</span><span class="back-data-value" style="color:#999">${fmt(s.d.total)} mg</span></div>

            <div class="back-data-row"><span class="back-data-label">Selenium</span><span class="back-data-value">${NUTRITION[s.handle].se_mcg} mcg/100g</span></div>

            <div class="back-data-row"><span class="back-data-label">Mercury</span><span class="back-data-value">${s.d.hg_ppb === 0 ? 'Non-Detect (< LOQ)' : s.d.hg_ppb + ' ppb'}</span></div>
            <div class="back-data-row"><span class="back-data-label">Tests</span><span class="back-data-value">${NUTRITION[s.handle].n_tests}</span></div>
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById('grid').innerHTML = html;
}
